{% extends 'base.html' %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Post New Score</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">{{ form.course.label_tag }} {{ form.course }}</div>
                        <div class="mb-3">{{ form.tee_set.label_tag }} {{ form.tee_set }}</div>
                        <div class="row">
                            <div class="col-6 mb-3">{{ form.date_played.label_tag }} {{ form.date_played }}</div>
                            <div class="col-6 mb-3">{{ form.scores.label_tag }} {{ form.scores }}</div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Submit Round</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
