{% extends "base.html" %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow mt-5">
                <div class="card-header bg-dark text-white">Login</div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-success w-100">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
